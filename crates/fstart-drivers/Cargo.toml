[package]
name = "fstart-drivers"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
ns16550 = []
pl011 = []
sifive-uart = []
designware-i2c = []
## Enable all driver features — used by fstart-codegen (host-side) to
## validate any board config regardless of target.
all-drivers = ["ns16550", "pl011", "designware-i2c"]

[dependencies]
embedded-hal = { workspace = true }
fstart-services = { workspace = true }
serde = { workspace = true }
tock-registers = "0.10"
