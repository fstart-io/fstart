[package]
name = "fstart-stage"
version.workspace = true
edition.workspace = true
license.workspace = true
autobins = false

[[bin]]
name = "fstart-stage"
path = "src/main.rs"

[features]
default = []
# Platform selection (exactly one must be enabled)
riscv64 = ["dep:fstart-platform-riscv64"]
aarch64 = ["dep:fstart-platform-aarch64"]
armv7 = ["dep:fstart-platform-armv7"]
# Allwinner sunxi support — adds fstart-soc-sunxi and enables the sunxi
# entry point on platforms that support it (AArch64 RMR switch for H5/A64,
# ARMv7 eGON boot for A20/H3, RISC-V eGON boot for D1).  Driven by
# `soc_image_format: AllwinnerEgon` in the board RON, not by platform —
# sunxi boards exist on multiple ISAs.
sunxi = ["dep:fstart-soc-sunxi", "fstart-platform-aarch64?/sunxi", "fstart-platform-armv7?/sunxi", "fstart-platform-riscv64?/sunxi"]
# SBSA entry point — copies firmware from flash to DRAM before executing.
sbsa = ["fstart-platform-aarch64?/sbsa"]
# Driver selection (enabled based on board.ron devices)
ns16550 = ["dep:fstart-driver-ns16550"]
pl011 = ["dep:fstart-driver-pl011"]
designware-i2c = ["dep:fstart-driver-designware-i2c"]
sunxi-a20-ccu = ["dep:fstart-driver-sunxi-ccu"]
sunxi-a20-dramc = ["dep:fstart-driver-sunxi-a20-dramc"]
sunxi-mmc = ["dep:fstart-driver-sunxi-mmc"]
sunxi-spi = ["dep:fstart-driver-sunxi-spi"]
sunxi-h3-ccu = ["dep:fstart-driver-sunxi-h3-ccu"]
sunxi-h3-dramc = ["dep:fstart-driver-sunxi-h3-dramc"]
sunxi-d1-ccu = ["dep:fstart-driver-sunxi-d1-ccu"]
sunxi-d1-dramc = ["dep:fstart-driver-sunxi-d1-dramc"]
sifive-uart = ["dep:fstart-driver-sifive-uart"]
fu740-prci = ["dep:fstart-driver-fu740-prci"]
fu740-ddr = ["dep:fstart-driver-fu740-ddr"]
pci-ecam = ["dep:fstart-driver-pci-ecam", "dep:fstart-alloc"]
bochs-display = ["dep:fstart-driver-bochs-display"]
# Sophgo SG2042 drivers (Milk-V Pioneer)
sg2042-top = ["dep:fstart-soc-sg2042"]
sg2042-wdt = ["dep:fstart-soc-sg2042"]
sg2042-ddr = ["dep:fstart-soc-sg2042"]
sg2042-cmn = ["dep:fstart-soc-sg2042"]
sg2042-plic = ["dep:fstart-soc-sg2042"]
sg2042-pcie = ["dep:fstart-soc-sg2042"]
sg2042-rv-release = ["dep:fstart-soc-sg2042"]
# sophgo = SG2042 MMU entry point + all SG2042 SoC crate features
sophgo = ["dep:fstart-soc-sg2042", "fstart-platform-aarch64?/sophgo"]
# FFS / crypto features (forwarded to fstart-capabilities)
ffs = ["fstart-capabilities/ffs", "dep:fstart-ffs"]
ed25519 = ["ffs", "fstart-capabilities/ed25519", "fstart-ffs/ed25519"]
sha2-digest = ["ffs", "fstart-capabilities/sha2-digest", "fstart-ffs/sha2-digest"]
sha3-digest = ["ffs", "fstart-capabilities/sha3-digest", "fstart-ffs/sha3-digest"]
# LZ4 decompression for compressed stage/payload segments
lz4 = ["ffs", "fstart-capabilities/lz4"]
# FDT preparation for Linux boot (raw blob patcher, no alloc)
fdt = ["fstart-capabilities/fdt"]
# FIT image parsing at runtime
fit = ["ffs", "fstart-capabilities/fit", "dep:fstart-fit"]
# Inter-stage handoff serialization (postcard, for multi-stage boards)
handoff = ["fstart-capabilities/handoff"]
# ACPI table generation — routed through fstart-capabilities which owns
# the prepare() entry point and depends on fstart-acpi internally.
# fstart-acpi is also a direct dep for per-device AcpiDevice trait calls.
acpi = ["dep:fstart-alloc", "dep:fstart-acpi", "fstart-acpi?/arm", "fstart-driver-pl011?/acpi", "fstart-capabilities/acpi"]
# SMBIOS table generation — routed through fstart-capabilities which owns
# the prepare() entry point and depends on fstart-smbios internally.
smbios = ["fstart-capabilities/smbios"]
# CrabEFI UEFI payload — links CrabEFI as a library and boots via init_platform().
# Requires alloc (fstart-alloc provides #[global_allocator]).
crabefi = ["dep:fstart-crabefi", "dep:fstart-alloc"]

[dependencies]
# Core firmware infrastructure
fstart-arch = { workspace = true }
fstart-services = { workspace = true }
fstart-capabilities = { workspace = true }
fstart-log = { workspace = true }
ufmt = { workspace = true }
fstart-runtime = { workspace = true }
fstart-types = { workspace = true }
heapless = { workspace = true }

# Platform crates (exactly one enabled via feature)
fstart-platform-riscv64 = { workspace = true, optional = true }
fstart-platform-aarch64 = { workspace = true, optional = true }
fstart-platform-armv7 = { workspace = true, optional = true }
fstart-soc-sunxi = { workspace = true, optional = true }

# Individual driver crates (enabled via features matching board.ron driver names)
fstart-driver-ns16550 = { workspace = true, optional = true }
fstart-driver-pl011 = { workspace = true, optional = true }
fstart-driver-designware-i2c = { workspace = true, optional = true }
fstart-driver-sunxi-ccu = { workspace = true, optional = true }
fstart-driver-sunxi-a20-dramc = { workspace = true, optional = true }
fstart-driver-sunxi-mmc = { workspace = true, optional = true }
fstart-driver-sunxi-spi = { workspace = true, optional = true }
fstart-driver-sunxi-h3-ccu = { workspace = true, optional = true }
fstart-driver-sunxi-h3-dramc = { workspace = true, optional = true }
fstart-driver-sunxi-d1-ccu = { workspace = true, optional = true }
fstart-driver-sunxi-d1-dramc = { workspace = true, optional = true }
fstart-driver-sifive-uart = { workspace = true, optional = true }
fstart-driver-fu740-prci = { workspace = true, optional = true }
fstart-driver-fu740-ddr = { workspace = true, optional = true }
fstart-driver-pci-ecam = { workspace = true, optional = true }
fstart-driver-bochs-display = { workspace = true, optional = true }
fstart-soc-sg2042 = { workspace = true, optional = true }

# FFS (optional, behind ffs feature)
fstart-ffs = { workspace = true, optional = true }
fstart-fit = { workspace = true, optional = true }

# ACPI table generation (optional, behind acpi feature)
fstart-acpi = { workspace = true, optional = true }

# Allocator (optional — provides #[global_allocator])
fstart-alloc = { workspace = true, optional = true }

# CrabEFI adapter (optional, behind crabefi feature)
fstart-crabefi = { workspace = true, optional = true }

[build-dependencies]
fstart-codegen = { workspace = true }
