[package]
name = "fstart-stage"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
# Platform selection (exactly one must be enabled)
riscv64 = ["dep:fstart-platform-riscv64"]
aarch64 = ["dep:fstart-platform-aarch64"]
armv7 = ["dep:fstart-platform-armv7"]
# Driver selection (enabled based on board.ron)
ns16550 = ["fstart-drivers/ns16550"]
pl011 = ["fstart-drivers/pl011"]
sifive-uart = ["fstart-drivers/sifive-uart"]
designware-i2c = ["fstart-drivers/designware-i2c"]
# FFS / crypto features (forwarded to fstart-capabilities)
ffs = ["fstart-capabilities/ffs", "dep:fstart-ffs"]
ed25519 = ["ffs", "fstart-capabilities/ed25519", "fstart-ffs/ed25519"]
sha2-digest = ["ffs", "fstart-capabilities/sha2-digest", "fstart-ffs/sha2-digest"]
sha3-digest = ["ffs", "fstart-capabilities/sha3-digest", "fstart-ffs/sha3-digest"]
# LZ4 decompression for compressed stage/payload segments
lz4 = ["ffs", "fstart-capabilities/lz4"]
# FDT preparation for Linux boot (bump allocator + dtoolkit)
fdt = ["fstart-capabilities/fdt", "dep:fstart-alloc"]
# FIT image parsing at runtime
fit = ["ffs", "fstart-capabilities/fit", "dep:fstart-fit"]

[dependencies]
fstart-services = { workspace = true }
fstart-drivers = { workspace = true }
fstart-capabilities = { workspace = true }
fstart-log = { workspace = true }
ufmt = { workspace = true }
fstart-runtime = { workspace = true }
fstart-types = { workspace = true }
fstart-platform-riscv64 = { workspace = true, optional = true }
fstart-platform-aarch64 = { workspace = true, optional = true }
fstart-platform-armv7 = { workspace = true, optional = true }
fstart-ffs = { workspace = true, optional = true }
fstart-fit = { workspace = true, optional = true }
fstart-alloc = { workspace = true, optional = true }

[build-dependencies]
fstart-codegen = { workspace = true }
fstart-types = { workspace = true, features = ["std"] }
