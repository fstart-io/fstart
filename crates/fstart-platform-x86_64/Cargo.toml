[package]
name = "fstart-platform-x86_64"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
fstart-arch-x86 = { workspace = true }
fstart-ffs = { workspace = true, optional = true }
fstart-log = { workspace = true }
fstart-pio = { workspace = true }
fstart-services = { workspace = true }
fstart-types = { workspace = true, optional = true }
ufmt = { workspace = true }

[features]
default = []
# Use 1 GiB pages for identity mapping (requires PDPE1GB).
# Without this feature, 2 MiB pages are used (universally supported).
x86-1g-pages = []
# Build page tables at runtime in writable RAM. QEMU uses this with
# page_table_addr; real XIP boards keep static page tables in ROM.
x86-writable-page-tables = []
# Emit prebuilt page tables into `.page_tables` for first-stage real XIP
# boards. Non-first stages inherit CR3 and do not need their own tables.
x86-static-page-tables = []
# Expose the generated FFS anchor to the pre-Rust microcode updater.
early-ffs-anchor = []
# Post-CAR StageLoad support for x86 bootblocks that load the next stage from FFS.
postcar-stage-load = ["dep:fstart-ffs", "dep:fstart-types"]
