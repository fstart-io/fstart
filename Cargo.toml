[workspace]
# Use dependency resolver v2 to allow [dev-dependencies] to have different
# features from [dependencies]. See
# https://doc.rust-lang.org/cargo/reference/resolver.html#feature-resolver-version-2
resolver = "2"
exclude = []
members = [
  # "arch", # arch drivers
  "builder",  # Puts image together based on build_fdt
  # "common", # non hardware specific drivers
  #  "console", # console drivers
  #  "cpu", # cpu drivers
  #  "drivers", # Aggregated files of drivers for build and code. Basically imports other code. Together with orchestrator core of project
  "fs",  # file system, also does security of dealing with multiple components.
  # "handoff", # ACPI SMBIOS, Linux_FDT, UPL, coreboot table, ... data
  #  "mainboard", # contains FDT. Design no code.
  #  "orchestrator", # Parses FDT, binds to drivers to nodes and iterates over them. Used by builder and code
  #  "periph", # Everything else
  #  "vendorcode", # Integration of vendorcode components. Focus on this later after fully open POC
]

# keep alphabetical
[workspace.dependencies]
devicetree-tool = "0.1.2"
digest = "0.10.7"
ed25519-dalek = { version = "2.1.1", default-features = false }
embassy-futures = "0.1.1"
embedded-io-async = "0.6.1"
fdt = "0.1.5"
generic-array = "0.14.7"
hex_lit = "0.1.1"
ml-dsa = { version = "0.0.4", default-features = false }
sha2 = "0.10.9"
signature = "2.2.0"
tempfile = "3.10.1"
vm-fdt = "0.3.0"
zerocopy = "0.7"
